<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1200" y2="320">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="50%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
    <!-- Fire gradients -->
    <linearGradient id="fireBody" x1="80" y1="30" x2="80" y2="220">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="20%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="fireWingL" x1="0" y1="30" x2="85" y2="190">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="fireWingR" x1="160" y1="30" x2="80" y2="190">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="fireChest" x1="80" y1="80" x2="80" y2="170">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="fireTail" x1="80" y1="170" x2="80" y2="270">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="25%" stop-color="#a1a1aa"/>
      <stop offset="50%" stop-color="#e4e4e7"/>
      <stop offset="75%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="chromeDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="40%" stop-color="#52525b"/>
      <stop offset="60%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#3f3f46"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="emberGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bannerBg)"/>
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#fff"/>
    </pattern>
    <rect width="1200" height="320" fill="url(#dots)"/>
  </g>

  <!-- Phoenix — wings swept up, chrome edges, fiery body -->
  <g transform="translate(52, 12) scale(0.82)">
    <!-- Ambient glow -->
    <ellipse cx="80" cy="130" rx="85" ry="100" fill="#f97316" opacity="0.06" filter="url(#softGlow)"/>

    <!-- === TAIL — pointed flame dagger dropping down === -->
    <path d="M74 175 C68 200, 58 230, 52 252 C48 262, 42 268, 38 272 C44 258, 52 235, 60 212 L72 180Z" fill="url(#fireTail)" opacity="0.6" filter="url(#glow)"/>
    <path d="M80 178 C80 205, 78 235, 75 258 C74 268, 72 275, 70 280 C74 265, 78 238, 80 210 L80 182Z" fill="url(#fireTail)" opacity="0.75" filter="url(#glow)"/>
    <path d="M80 180 C80 215, 80 248, 80 275 C80 282, 80 286, 80 290 C80 280, 80 250, 80 215Z" fill="url(#fireTail)" opacity="0.85" filter="url(#glow)"/>
    <path d="M80 178 C80 205, 82 235, 85 258 C86 268, 88 275, 90 280 C86 265, 82 238, 80 210 L80 182Z" fill="url(#fireTail)" opacity="0.75" filter="url(#glow)"/>
    <path d="M86 175 C92 200, 102 230, 108 252 C112 262, 118 268, 122 272 C116 258, 108 235, 100 212 L88 180Z" fill="url(#fireTail)" opacity="0.6" filter="url(#glow)"/>

    <!-- === LEFT WING — swept dramatically upward === -->
    <!-- Chrome outer edge -->
    <path d="M62 108 C48 82, 22 48, -5 18 C-10 12, -14 8, -18 5
             C-12 12, -2 28, 10 45 C-5 32, -18 18, -28 8
             C-18 22, -2 42, 15 58 C0 48, -15 35, -25 25
             C-12 40, 5 58, 22 72
             L58 108Z"
      fill="url(#chromeDark)" opacity="0.7"/>
    <!-- Fire fill -->
    <path d="M60 110 C45 85, 18 52, -2 25
             C8 38, 20 55, 32 70
             C15 58, -2 42, -12 30
             C0 48, 15 62, 35 78
             C20 70, 5 58, -5 48
             C8 62, 25 75, 45 88
             C30 85, 15 80, 5 72
             C18 85, 38 95, 52 100
             L58 112Z"
      fill="url(#fireWingL)" opacity="0.9"/>
    <!-- Chrome highlight stroke on leading edge -->
    <path d="M60 108 C45 80, 18 46, -5 18" stroke="url(#chrome)" stroke-width="1.8" fill="none" opacity="0.6"/>
    <path d="M-5 18 C-12 10, -16 6, -18 5" stroke="#e4e4e7" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- === RIGHT WING — mirror === -->
    <!-- Chrome outer edge -->
    <path d="M98 108 C112 82, 138 48, 165 18 C170 12, 174 8, 178 5
             C172 12, 162 28, 150 45 C165 32, 178 18, 188 8
             C178 22, 162 42, 145 58 C160 48, 175 35, 185 25
             C172 40, 155 58, 138 72
             L102 108Z"
      fill="url(#chromeDark)" opacity="0.7"/>
    <!-- Fire fill -->
    <path d="M100 110 C115 85, 142 52, 162 25
             C152 38, 140 55, 128 70
             C145 58, 162 42, 172 30
             C160 48, 145 62, 125 78
             C140 70, 155 58, 165 48
             C152 62, 135 75, 115 88
             C130 85, 145 80, 155 72
             C142 85, 122 95, 108 100
             L102 112Z"
      fill="url(#fireWingR)" opacity="0.9"/>
    <!-- Chrome highlight stroke -->
    <path d="M100 108 C115 80, 142 46, 165 18" stroke="url(#chrome)" stroke-width="1.8" fill="none" opacity="0.6"/>
    <path d="M165 18 C172 10, 176 6, 178 5" stroke="#e4e4e7" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- === BODY === -->
    <path d="M80 58 C92 65, 102 82, 103 102 C104 118, 101 135, 97 150 C93 162, 87 172, 80 178 C73 172, 67 162, 63 150 C59 135, 56 118, 57 102 C58 82, 68 65, 80 58Z"
      fill="url(#fireBody)"/>
    <!-- Chrome body outline -->
    <path d="M80 58 C92 65, 102 82, 103 102 C104 118, 101 135, 97 150 C93 162, 87 172, 80 178 C73 172, 67 162, 63 150 C59 135, 56 118, 57 102 C58 82, 68 65, 80 58Z"
      fill="none" stroke="url(#chromeDark)" stroke-width="1.2" opacity="0.35"/>

    <!-- Chest -->
    <path d="M80 82 C89 87, 95 100, 95 115 C95 128, 92 140, 88 152 C85 158, 82 162, 80 164 C78 162, 75 158, 72 152 C68 140, 65 128, 65 115 C65 100, 71 87, 80 82Z"
      fill="url(#fireChest)" opacity="0.85"/>
    <!-- Feather scale lines -->
    <path d="M68 112 Q80 117 92 112" stroke="#f59e0b" stroke-width="0.35" fill="none" opacity="0.35"/>
    <path d="M67 124 Q80 130 93 124" stroke="#f59e0b" stroke-width="0.35" fill="none" opacity="0.3"/>
    <path d="M68 136 Q80 141 92 136" stroke="#f59e0b" stroke-width="0.3" fill="none" opacity="0.25"/>

    <!-- Head -->
    <ellipse cx="80" cy="64" rx="15" ry="14" fill="#f97316"/>
    <ellipse cx="80" cy="66" rx="11" ry="10" fill="#fb923c" opacity="0.5"/>
    <!-- Chrome head outline -->
    <ellipse cx="80" cy="64" rx="15" ry="14" fill="none" stroke="url(#chromeDark)" stroke-width="1" opacity="0.3"/>

    <!-- Crest — swept back, elegant -->
    <path d="M80 52 C78 36, 70 18, 64 6 C71 20, 76 36, 78 48Z" fill="#fde68a" filter="url(#glow)" opacity="0.8"/>
    <path d="M80 52 C80 32, 80 14, 80 0 C80 16, 80 34, 80 48Z" fill="#fef08a" filter="url(#glow)" opacity="0.9"/>
    <path d="M80 52 C82 36, 90 18, 96 6 C89 20, 84 36, 82 48Z" fill="#fde68a" filter="url(#glow)" opacity="0.8"/>
    <!-- Chrome crest tips -->
    <path d="M64 6 C62 3, 61 1, 60 0" stroke="#a1a1aa" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M80 0 C80 -2, 80 -3, 80 -4" stroke="#d4d4d8" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M96 6 C98 3, 99 1, 100 0" stroke="#a1a1aa" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Eyes — fierce -->
    <ellipse cx="73" cy="62" rx="3.2" ry="3.5" fill="#0e0e10"/>
    <ellipse cx="87" cy="62" rx="3.2" ry="3.5" fill="#0e0e10"/>
    <ellipse cx="73" cy="62" rx="1.8" ry="2" fill="#991b1b" opacity="0.5"/>
    <ellipse cx="87" cy="62" rx="1.8" ry="2" fill="#991b1b" opacity="0.5"/>
    <ellipse cx="73.5" cy="60.5" rx="1.1" ry="1.3" fill="#fef9c3" opacity="0.95"/>
    <ellipse cx="87.5" cy="60.5" rx="1.1" ry="1.3" fill="#fef9c3" opacity="0.95"/>

    <!-- Beak -->
    <path d="M77 70 L80 78 L83 70Z" fill="#991b1b"/>
    <path d="M78 70 L80 75 L82 70Z" fill="#c2410c" opacity="0.6"/>

    <!-- Embers -->
    <circle cx="12" cy="42" r="1.8" fill="#fbbf24" opacity="0.55" filter="url(#emberGlow)"/>
    <circle cx="148" cy="45" r="1.5" fill="#fde68a" opacity="0.5" filter="url(#emberGlow)"/>
    <circle cx="32" cy="25" r="1" fill="#fef9c3" opacity="0.4" filter="url(#emberGlow)"/>
    <circle cx="130" cy="28" r="1.2" fill="#fbbf24" opacity="0.35" filter="url(#emberGlow)"/>
    <circle cx="0" cy="65" r="0.9" fill="#fde68a" opacity="0.3" filter="url(#emberGlow)"/>
    <circle cx="160" cy="68" r="1" fill="#fde68a" opacity="0.25" filter="url(#emberGlow)"/>
    <circle cx="25" cy="225" r="1.3" fill="#ef4444" opacity="0.25" filter="url(#emberGlow)"/>
    <circle cx="138" cy="230" r="1.1" fill="#f97316" opacity="0.2" filter="url(#emberGlow)"/>
  </g>

  <!-- FORGE text -->
  <text x="265" y="148" fill="url(#textGrad)" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="90" font-weight="800" letter-spacing="-2">FORGE</text>

  <!-- Tagline -->
  <text x="270" y="188" fill="#71717a" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="22" font-weight="500">The operating system for Claude Code</text>

  <!-- Accent line -->
  <rect x="100" y="220" width="1000" height="1" fill="url(#accentLine)" opacity="0.25"/>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5" font-weight="500">
    <rect x="270" y="240" width="148" height="26" rx="13" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="344" y="257" text-anchor="middle" fill="#f97316">Multi-Session</text>

    <rect x="432" y="240" width="138" height="26" rx="13" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="501" y="257" text-anchor="middle" fill="#22c55e">Cost Tracking</text>

    <rect x="584" y="240" width="130" height="26" rx="13" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="649" y="257" text-anchor="middle" fill="#3b82f6">Permissions</text>

    <rect x="728" y="240" width="152" height="26" rx="13" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="804" y="257" text-anchor="middle" fill="#a855f7">Agent Workflows</text>

    <rect x="894" y="240" width="142" height="26" rx="13" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="965" y="257" text-anchor="middle" fill="#eab308">Prompt Library</text>
  </g>

  <!-- Version pill -->
  <rect x="1080" y="285" width="90" height="22" rx="11" fill="#27272a"/>
  <text x="1125" y="300" text-anchor="middle" fill="#71717a" font-family="'SF Mono', monospace" font-size="10" font-weight="600">v1.0.0</text>
</svg>
